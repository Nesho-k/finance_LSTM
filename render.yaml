services:
  - type: web
    name: meteo-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TF_CPP_MIN_LOG_LEVEL
        value: 2
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: ALLOWED_ORIGINS
        value: https://meteo-front-one.vercel.app/,http://localhost:3000,http://localhost:5173
    healthCheckPath: /health
